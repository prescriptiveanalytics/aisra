services:
  db:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    command: redis-server --save "" --appendonly no
    networks:
      - heal-net

  mqtt-broker:
    image: eclipse-mosquitto:2.1-alpine
    ports:
      - "${MQTT_PORT_HOST:-1883}:1883"
    networks:
      - heal-net

  heuristic-web:
    build:
      context: ./backend/src
      dockerfile: HEAL.HeuristicWeb.Server/Dockerfile
    ports:
      - "${SERVER_GRPC_PORT_HOST:-5000}:5000"
      - "${SERVER_REST_PORT_HOST:-5081}:8080"
    environment:
      GRPC_PORT: 5000
      REST_PORT: 8080
      ENABLE_HTTPS: "${SERVER_ENABLE_HTTPS:-false}"
    networks:
      - heal-net

  agent-web:
    build:
      context: ./backend/src
      dockerfile: HEAL.HeuristicAgent.Web/Dockerfile
    ports:
      - "${AGENT_PORT_HOST:-5297}:8080"
    environment:
      HTTP_PORT: 8080
      ENABLE_HTTPS: "${AGENT_ENABLE_HTTPS:-false}"
      RedisHost: db:6379
      MqttHost: mqtt-broker
      MqttPort: 1883
      ClientType: "${CLIENT_TYPE:-Grpc}"
      Server: http://heuristic-web:5000
      OpenRouterApiKey: "${OPENROUTER_API_KEY:?OpenRouter API key is required}"
      Model: "${MODEL:-openrouter/owl-alpha}"
      ModelEndpoint: "${MODEL_ENDPOINT:-https://openrouter.ai/api/v1/}"
    depends_on:
      db:
        condition: service_started
      mqtt-broker:
        condition: service_started
      heuristic-web:
        condition: service_started
    networks:
      - heal-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_URL: "${PUBLIC_API_URL:-http://localhost:5297}"
    ports:
      - "${FRONTEND_PORT_HOST:-3000}:3000"
    environment:
      PORT: 3000
    depends_on:
      - agent-web
    networks:
      - heal-net

networks:
  heal-net:
    driver: bridge
